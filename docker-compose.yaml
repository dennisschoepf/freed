services:
  pocketbase:
    container_name: pocketbase
    build: 
      context: .
      dockerfile: Pocketbase.Dockerfile
    image: pocketbase:latest
    volumes:
      - pocketbase-volume:/app/pocketbase/pb_data
    networks:
      - freed-network
    ports:
      - "8090:8090"

networks:
  freed-network:
    name: freed-network

volumes:
  pocketbase-volume:
    name: pocketbase-volume
